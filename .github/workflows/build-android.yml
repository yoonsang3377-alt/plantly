name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: npx cap init Plantly com.plantly.app --web-dir dist/public

      - name: Add Android platform
        run: npx cap add android

      - name: Fix Kotlin duplicate class conflict
        run: |
          python3 - << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          fix = "\nconfigurations.all {\n    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'\n    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'\n}\n"
          with open('android/app/build.gradle', 'w') as f:
              f.write(fix + content)
          print("Fixed android/app/build.gradle")
          PYEOF

      - name: Copy web assets
        run: npx cap copy android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plantly-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
